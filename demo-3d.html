<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: absolute; top: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font: 13px/1.6 system-ui, sans-serif;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">drag to rotate · scroll to zoom</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);
scene.fog = new THREE.FogExp2(0x000008, 0.035);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 4, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 40;

// Lights
const ambient = new THREE.AmbientLight(0x112244, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(8, 16, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
scene.add(sun);

// Accent lights
const colors = [0x4488ff, 0xff4488, 0x44ffaa];
colors.forEach((c, i) => {
  const pl = new THREE.PointLight(c, 6, 20);
  const angle = (i / colors.length) * Math.PI * 2;
  pl.position.set(Math.cos(angle) * 7, 3, Math.sin(angle) * 7);
  scene.add(pl);
});

// Ground
const groundGeo = new THREE.PlaneGeometry(60, 60, 40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x050510,
  roughness: 0.8,
  metalness: 0.2,
  wireframe: false,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid on ground
const grid = new THREE.GridHelper(60, 40, 0x223366, 0x111133);
grid.position.y = -2.49;
scene.add(grid);

// Central torus knot
const knotGeo = new THREE.TorusKnotGeometry(2, 0.55, 200, 24, 2, 3);
const knotMat = new THREE.MeshStandardMaterial({
  color: 0x3366ff,
  roughness: 0.15,
  metalness: 0.85,
  envMapIntensity: 1.2,
});
const knot = new THREE.Mesh(knotGeo, knotMat);
knot.castShadow = true;
knot.receiveShadow = true;
scene.add(knot);

// Orbiting spheres
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

const sphereGeo = new THREE.SphereGeometry(0.45, 32, 32);
const sphereColors = [0xff4466, 0x44ffbb, 0xffaa22, 0x9944ff, 0x22aaff];
const orbiters = sphereColors.map((c, i) => {
  const mat = new THREE.MeshStandardMaterial({
    color: c, roughness: 0.2, metalness: 0.7, emissive: c, emissiveIntensity: 0.15,
  });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.castShadow = true;
  const angle = (i / sphereColors.length) * Math.PI * 2;
  const radius = 4.5 + (i % 2) * 1.2;
  mesh.position.set(Math.cos(angle) * radius, Math.sin(i * 0.8) * 1.5, Math.sin(angle) * radius);
  orbitGroup.add(mesh);
  return { mesh, radius, speed: 0.3 + i * 0.07, phase: angle, yPhase: i * 0.8 };
});

// Floating rings
const ringGroup = new THREE.Group();
scene.add(ringGroup);
for (let i = 0; i < 5; i++) {
  const rGeo = new THREE.TorusGeometry(1.2 + i * 0.5, 0.04, 16, 80);
  const rMat = new THREE.MeshStandardMaterial({
    color: 0x334477,
    roughness: 0.3,
    metalness: 0.9,
    transparent: true,
    opacity: 0.6 - i * 0.08,
  });
  const ring = new THREE.Mesh(rGeo, rMat);
  ring.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
  ringGroup.add(ring);
}

// Particle field
const PARTICLES = 3000;
const positions = new Float32Array(PARTICLES * 3);
const pColors = new Float32Array(PARTICLES * 3);
for (let i = 0; i < PARTICLES; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 8 + Math.random() * 18;
  positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) - 1;
  positions[i * 3 + 2] = r * Math.cos(phi);
  const t = Math.random();
  pColors[i * 3]     = 0.2 + t * 0.4;
  pColors[i * 3 + 1] = 0.4 + t * 0.4;
  pColors[i * 3 + 2] = 0.8 + t * 0.2;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
const pMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.7 });
scene.add(new THREE.Points(pGeo, pMat));

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  knot.rotation.x = t * 0.3;
  knot.rotation.y = t * 0.5;

  orbitGroup.rotation.y = t * 0.25;
  orbiters.forEach(({ mesh, radius, speed, phase, yPhase }) => {
    const a = phase + t * speed;
    mesh.position.x = Math.cos(a) * radius;
    mesh.position.z = Math.sin(a) * radius;
    mesh.position.y = Math.sin(t * speed * 1.3 + yPhase) * 1.8;
    mesh.rotation.x = t;
    mesh.rotation.y = t * 0.7;
  });

  ringGroup.rotation.y = t * 0.12;
  ringGroup.rotation.x = Math.sin(t * 0.2) * 0.3;
  ringGroup.children.forEach((r, i) => {
    r.rotation.z = t * (0.2 + i * 0.05);
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
