<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nordwind — Loading Screen Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: system-ui, sans-serif; }

  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }

  #logo {
    font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); margin-bottom: 6px;
  }
  #brand {
    font-size: 28px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 2px;
  }
  #subtitle {
    font-size: 11px; letter-spacing: 0.3em; color: #E31E24;
    text-transform: uppercase; margin-bottom: 48px;
  }

  #progress-wrap {
    width: 220px; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #bar-bg {
    width: 100%; height: 2px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  #bar-fill {
    height: 100%; width: 0%; background: #E31E24;
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px #E31E24, 0 0 20px #E31E2460;
  }
  #pct {
    font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="logo">Virtual Airlines</div>
  <div id="brand">Nordwind</div>
  <div id="subtitle">VWS · Est. 2023</div>
  <div id="progress-wrap">
    <div id="bar-bg"><div id="bar-fill"></div></div>
    <div id="pct">0%</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 2, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.inset = '0';

// ── LIGHTS ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223355, 1.2));

const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(6, 10, 8);
scene.add(sun);

const redLight = new THREE.PointLight(0xE31E24, 8, 18);
redLight.position.set(-4, 2, 6);
scene.add(redLight);

const blueLight = new THREE.PointLight(0x4488ff, 4, 20);
blueLight.position.set(6, 4, 2);
scene.add(blueLight);

// ── MATERIALS ─────────────────────────────────────────────────────────────────
const bodyMat  = new THREE.MeshStandardMaterial({ color: 0xdde8f0, roughness: 0.25, metalness: 0.7 });
const redMat   = new THREE.MeshStandardMaterial({ color: 0xE31E24, roughness: 0.3, metalness: 0.5, emissive: 0xE31E24, emissiveIntensity: 0.1 });
const darkMat  = new THREE.MeshStandardMaterial({ color: 0x111820, roughness: 0.5, metalness: 0.6 });
const glassMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.55 });

// ── AIRPLANE ──────────────────────────────────────────────────────────────────
const plane = new THREE.Group();

// Fuselage
const fuseGeo = new THREE.CylinderGeometry(0.55, 0.38, 7.5, 24);
const fuse = new THREE.Mesh(fuseGeo, bodyMat);
fuse.rotation.z = Math.PI / 2;
plane.add(fuse);

// Nose cone
const noseGeo = new THREE.ConeGeometry(0.55, 1.6, 24);
const nose = new THREE.Mesh(noseGeo, bodyMat);
nose.rotation.z = -Math.PI / 2;
nose.position.x = 4.5;
plane.add(nose);

// Tail cone
const tailGeo = new THREE.ConeGeometry(0.38, 1.2, 24);
const tail = new THREE.Mesh(tailGeo, darkMat);
tail.rotation.z = Math.PI / 2;
tail.position.x = -4.3;
plane.add(tail);

// Cockpit windows
const cockpitGeo = new THREE.SphereGeometry(0.42, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.5);
const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
cockpit.position.set(3.6, 0.28, 0);
plane.add(cockpit);

// Red stripe
const stripeGeo = new THREE.CylinderGeometry(0.562, 0.562, 4.5, 24, 1, true);
const stripe = new THREE.Mesh(stripeGeo, redMat);
stripe.rotation.z = Math.PI / 2;
stripe.position.x = 0.5;
plane.add(stripe);

// Main wings
function makeWing(side) {
  const g = new THREE.BufferGeometry();
  const s = side;
  const v = new Float32Array([
    0.8,  0,    0.3,
    0.8,  0,   -0.5,
   -1.2,  0,    0.2,
   -1.2,  0,   -0.3,
    0.8, s*4.8, 0.1,
    0.8, s*4.8, -0.18,
   -0.6, s*5.5, 0.05,
   -0.6, s*5.5,-0.12,
  ]);
  const idx = [0,1,2, 1,3,2, 0,4,1, 4,5,1, 1,5,3, 5,7,3, 3,7,2, 7,6,2, 0,2,4, 2,6,4, 4,6,5, 6,7,5];
  g.setAttribute('position', new THREE.BufferAttribute(v, 3));
  g.setIndex(idx);
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, bodyMat.clone());
  m.position.x = -0.3;
  return m;
}
plane.add(makeWing(1));
plane.add(makeWing(-1));

// Wing tips red
[-1, 1].forEach(s => {
  const tipGeo = new THREE.BoxGeometry(0.12, 0.65, 0.06);
  const tip = new THREE.Mesh(tipGeo, redMat);
  tip.position.set(-0.6, s * 5.55, -0.03);
  plane.add(tip);
});

// Horizontal stabilizers
[-1, 1].forEach(s => {
  const hg = new THREE.BoxGeometry(1.6, 2.2, 0.09);
  const h = new THREE.Mesh(hg, bodyMat);
  h.rotation.x = Math.PI / 2;
  h.position.set(-3.5, s * 1.5, 0);
  plane.add(h);
});

// Vertical tail
const vtg = new THREE.BufferGeometry();
vtg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0,0,0,  1.8,0,0,  0,0,2.1,  1.4,0,1.9,
]), 3));
vtg.setIndex([0,2,3, 0,3,1]);
vtg.computeVertexNormals();
const vt = new THREE.Mesh(vtg, bodyMat);
vt.position.set(-4.1, 0, 0.36);
plane.add(vt);

// Vertical tail red stripe
const vtsr = new THREE.Mesh(
  new THREE.PlaneGeometry(1.2, 1.4),
  redMat
);
vtsr.position.set(-3.5, 0.01, 1.1);
plane.add(vtsr);

// Engines
[-1, 1].forEach(s => {
  const engGroup = new THREE.Group();
  const eng = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.24, 1.4, 20), darkMat);
  eng.rotation.z = Math.PI / 2;
  engGroup.add(eng);
  const cowl = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.06, 12, 24), darkMat);
  cowl.rotation.y = Math.PI / 2;
  cowl.position.x = 0.7;
  engGroup.add(cowl);
  engGroup.position.set(0.4, s * 2.8, -0.35);
  plane.add(engGroup);
});

// Landing gear (retracted bumps)
[-1, 1].forEach(s => {
  const gear = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), darkMat);
  gear.position.set(0.5, s * 1.2, -0.52);
  plane.add(gear);
});

plane.rotation.y = -0.3;
plane.rotation.z = 0.08;
plane.position.set(0, 0, 0);
scene.add(plane);

// ── ENGINE GLOW ───────────────────────────────────────────────────────────────
[-1, 1].forEach(s => {
  const glow = new THREE.PointLight(0x4499ff, 1.5, 3);
  glow.position.set(-0.3, s * 2.8, -0.35);
  plane.add(glow);
});

// ── CLOUDS / PARTICLES ────────────────────────────────────────────────────────
const N = 1800;
const pos = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  pos[i*3]   = (Math.random() - 0.5) * 60;
  pos[i*3+1] = (Math.random() - 0.5) * 28;
  pos[i*3+2] = (Math.random() - 0.5) * 30 - 5;
}
const pg = new THREE.BufferGeometry();
pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
const pm = new THREE.PointsMaterial({ size: 0.06, color: 0x8899bb, transparent: true, opacity: 0.4 });
scene.add(new THREE.Points(pg, pm));

// Ground fog strips (simulated clouds below)
for (let i = 0; i < 12; i++) {
  const cg = new THREE.SphereGeometry(2.5 + Math.random() * 3, 8, 4);
  const cm = new THREE.MeshStandardMaterial({ color: 0x1a2030, transparent: true, opacity: 0.25, roughness: 1 });
  const cloud = new THREE.Mesh(cg, cm);
  cloud.position.set((Math.random() - 0.5) * 40, -6 + Math.random() * 3, (Math.random() - 0.5) * 15 - 3);
  cloud.scale.y = 0.25;
  scene.add(cloud);
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
let pct = 0;
const bar = document.getElementById('bar-fill');
const pctEl = document.getElementById('pct');
const interval = setInterval(() => {
  pct = Math.min(pct + Math.random() * 4 + 1, 100);
  bar.style.width = pct + '%';
  pctEl.textContent = Math.floor(pct) + '%';
  if (pct >= 100) clearInterval(interval);
}, 80);

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── ANIMATE ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle flight motion
  plane.position.y = Math.sin(t * 0.6) * 0.25;
  plane.position.x = Math.sin(t * 0.3) * 0.4;
  plane.rotation.z = 0.08 + Math.sin(t * 0.6) * 0.025;
  plane.rotation.x = Math.sin(t * 0.4) * 0.015;

  // Drift camera slightly
  camera.position.x = Math.sin(t * 0.15) * 0.5;
  camera.position.y = 2 + Math.sin(t * 0.2) * 0.3;

  // Particle drift
  const posArr = pg.attributes.position.array;
  for (let i = 0; i < N; i++) {
    posArr[i*3] += 0.015;
    if (posArr[i*3] > 30) posArr[i*3] = -30;
  }
  pg.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
